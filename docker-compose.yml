# Local observability backend. Jaeger all-in-one receives OTLP/HTTP on 4318 and
# serves its UI on 16686. Point the app at it with:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: go-ledger-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4318:4318"   # OTLP/HTTP
      - "4317:4317"   # OTLP/gRPC (unused by default, exposed for convenience)

  # --- Local dev stack: `docker compose --profile dev up` -------------------
  # app + postgres + prometheus (jaeger is profile-less, so it joins any run)
  # for local development and manual exploration. These carry the `dev` profile
  # so they never start alongside the `load-test` profile. Docker Compose always
  # starts profile-less services, so if the dev services had no profile they
  # would boot during `--profile load-test up` too and collide on ports 8080 and
  # 5432; the `dev` profile keeps the two stacks fully separate.
  dev-postgres:
    image: postgres:16
    container_name: go-ledger-dev-postgres
    profiles: ["dev"]
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 2s
      timeout: 3s
      retries: 15

  dev-app:
    build: .
    container_name: go-ledger-dev-app
    profiles: ["dev"]
    depends_on:
      dev-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@dev-postgres:5432/ledger?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      METRICS_ADDR: "0.0.0.0:9090"
      PORT: "8080"
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: go-ledger-prometheus
    profiles: ["dev"]
    depends_on:
      - dev-app
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # alerts.yml sits next to prometheus.yml in the container too, so the
      # rule_files: [alerts.yml] relative path in prometheus.yml resolves.
      - ./deploy/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9091:9090"

  # load-test profile: a full, self-contained stack (postgres + app, jaeger
  # included) for k6/etc. load runs against a real server. Not started by a
  # plain `docker compose up`; bring it up with:
  #   docker compose --profile load-test up -d --build
  postgres:
    image: postgres:16
    container_name: go-ledger-postgres
    profiles: ["load-test"]
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 2s
      timeout: 3s
      retries: 15

  # The app self-migrates on boot (embedded goose migrations in main.go), so
  # no separate migration or init step is needed here. SEED_ENABLED is off
  # and DEFAULT_TENANT_ID points at a dedicated load tenant so the demo
  # seeder never collides with load traffic. LOAD_TEST_API_KEY provisions a
  # high-limit key (see ADR-012, "Per-key rate limiting") for that tenant at
  # startup, so k6 authenticates instead of hitting the 401 the API now
  # requires on /v1. It is a fixed, hardcoded test credential, fine for a
  # local, disposable load-test stack.
  #
  # LOAD_TEST_TENANTS additionally provisions that many high-limit keys, one
  # per distinct tenant (glk_loadtest_fixed_local_key-t0, -t1, ...). Each
  # tenant's audit hash chain serializes same-tenant transaction posts
  # through an in-process mutex (T13b), so one tenant's throughput is
  # bounded no matter its rate limit. Spreading the k6 load-test.js run
  # across these tenants lets aggregate throughput reach the 500 RPS target.
  app:
    build: .
    container_name: go-ledger-app
    profiles: ["load-test"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      SEED_ENABLED: "false"
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000002"
      LOAD_TEST_API_KEY: "glk_loadtest_fixed_local_key"
      LOAD_TEST_TENANTS: "8"
      PORT: "8080"
    ports:
      - "8080:8080"

  # --- One-command run profiles (ADR-019, "One-command run") ----------------
  # `demo` and `local` are the two newcomer-facing profiles. Both bring up a
  # dedicated postgres, run the `migrate` subcommand once as an init step
  # (reusing the same one-shot entry point the deploy pipeline uses ahead of
  # a binary swap, see runMigrateCommand in cmd/server/main.go), and only then
  # start the app via depends_on: condition: service_completed_successfully.
  # Each profile uses its own container, volume, and service names so the two
  # never collide if both happened to be started; both still publish 8080 and
  # 5432 on the host, so do not run `demo` and `local` at the same time (or
  # alongside `dev` / `load-test`, which publish the same ports too).
  #
  #   docker compose --profile demo up   # seeded, public admin, resets often
  #   docker compose --profile local up  # empty, prints a bootstrap admin key
  demo-postgres:
    image: postgres:16
    container_name: go-ledger-demo-postgres
    profiles: ["demo"]
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - go-ledger-demo-postgres-data:/var/lib/postgresql/data

  demo-migrate:
    build: .
    container_name: go-ledger-demo-migrate
    profiles: ["demo"]
    depends_on:
      demo-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@demo-postgres:5432/ledger?sslmode=disable
    command: ["migrate"]
    restart: "no"

  demo-app:
    build: .
    container_name: go-ledger-demo-app
    profiles: ["demo"]
    depends_on:
      demo-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ledger:ledger@demo-postgres:5432/ledger?sslmode=disable
      DEMO_MODE: "true"
      SEED_ENABLED: "true"
      PORT: "8080"
    ports:
      - "8080:8080"

  local-postgres:
    image: postgres:16
    container_name: go-ledger-local-postgres
    profiles: ["local"]
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - go-ledger-local-postgres-data:/var/lib/postgresql/data

  local-migrate:
    build: .
    container_name: go-ledger-local-migrate
    profiles: ["local"]
    depends_on:
      local-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@local-postgres:5432/ledger?sslmode=disable
    command: ["migrate"]
    restart: "no"

  local-app:
    build: .
    container_name: go-ledger-local-app
    profiles: ["local"]
    depends_on:
      local-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ledger:ledger@local-postgres:5432/ledger?sslmode=disable
      SEED_ENABLED: "false"
      PORT: "8080"
      # DEMO_MODE is left unset here on purpose: production mode, so the
      # server provisions and prints a bootstrap admin key on first boot
      # instead of a public demo admin.
    ports:
      - "8080:8080"

volumes:
  go-ledger-demo-postgres-data:
  go-ledger-local-postgres-data:
