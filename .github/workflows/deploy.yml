name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.ref) || format('cicd-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test with coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and test cmd (no business logic, no coverage floor)
        run: go test -race ./cmd/...

      - name: Run tests (unit, integration, chaos, property; Docker available on the runner)
        # -p 2 caps how many packages spin testcontainers at once, so a small
        # runner is not starting Postgres and toxiproxy for several packages in
        # parallel and racing on container startup.
        run: go test -race -p 2 ./internal/... -covermode=atomic -coverprofile=cover.out

      - name: Enforce coverage gate
        run: COVER_PROFILE=cover.out make cover

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out

  smoke-load:
    name: Smoke load test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Boot the load-test stack
        run: docker compose --profile load-test up -d --build

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then
              exit 0
            fi
            sleep 2
          done
          echo "app never became healthy"
          docker compose --profile load-test logs app
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Smoke load (gate on errors and a loose p99 ceiling only)
        run: SMOKE=1 k6 run test/load/post_transactions.js

      - name: Teardown
        if: always()
        run: docker compose --profile load-test down

  coverage-badge:
    name: Publish coverage badge
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Build shields endpoint JSON
        run: |
          # Match scripts/coverage.sh: strip generated packages (0% coverage,
          # no tests of their own) before computing the total, so the badge
          # reports the same number the coverage gate enforces, not a number
          # dragged down by generated code.
          EXCLUDE='internal/genproto/|internal/postgres/sqlc/'
          FILTERED="$(mktemp)"
          head -n 1 cover.out > "$FILTERED"
          grep -vE "$EXCLUDE" cover.out | tail -n +2 >> "$FILTERED" || true
          PCT=$(go tool cover -func="$FILTERED" | grep '^total:' | awk '{print $3}' | tr -d '%')
          rm -f "$FILTERED"
          COLOR=red
          awk "BEGIN{exit !($PCT>=70 && $PCT<80)}" && COLOR=yellow
          awk "BEGIN{exit !($PCT>=80)}" && COLOR=brightgreen
          mkdir -p out
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > out/coverage.json

      - name: Publish to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp out/coverage.json /tmp/coverage.json
          git fetch origin badges || true
          if git checkout badges 2>/dev/null; then
            find . -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
          else
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp /tmp/coverage.json coverage.json
          git add coverage.json
          git commit -m "chore: update coverage badge" || echo "no change"
          git push origin badges

  deploy:
    name: Deploy to VPS
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build linux/amd64 binary
        # -X main.buildRevision stamps the short commit SHA into the binary
        # (Task 5.6a, audit A6.1) so /healthz and the build_info metric report
        # exactly which build is serving in production (Task 5.6b makes the
        # deployed binary actually carry it, not just the field existing).
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags="-s -w -X main.buildRevision=${GITHUB_SHA::7}" \
            -o go-ledger ./cmd/server

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload binary
        run: scp -i ~/.ssh/deploy_key go-ledger "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/go-ledger/go-ledger.new"

      - name: Migrate (pre-swap)
        # Applies every pending goose migration against production BEFORE the
        # new binary is swapped in (Task 5.6b, audit A4.3, ADR-017 "Migrations
        # run in CI before deploy"): schema changes land ahead of the code
        # that needs them, and a failed migration fails this step, which
        # stops the job here, so the swap-and-restart step below never runs
        # and the currently running (old) binary is left untouched. The
        # go-ledger-migrate wrapper (infra/ansible/roles/app) loads the box's
        # own /etc/go-ledger/env and execs go-ledger.new migrate; it is
        # root-owned and reachable only through the narrowly scoped sudoers
        # rule installed by that role, not by ssh'ing in and running an
        # arbitrary command as root.
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -euo pipefail
            chmod 755 /opt/go-ledger/go-ledger.new
            sudo /usr/local/sbin/go-ledger-migrate
          '

      - name: Swap binary and restart service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -euo pipefail
            cd /opt/go-ledger
            if [ -f go-ledger ]; then mv go-ledger go-ledger.prev; fi
            mv go-ledger.new go-ledger
            sudo systemctl restart go-ledger
          '

      - name: Health check (rollback on failure)
        # A bad binary self-heals to the last-known-good one (Task 5.6b,
        # audit A6.2): if the post-restart health check fails, ssh back in,
        # restore go-ledger.prev over go-ledger, restart, and re-check health,
        # then fail the pipeline loudly either way. A rollback does NOT
        # un-apply the migration that just ran; see docs/ops/server-setup.md
        # for why migrations must stay backward-compatible with the previous
        # binary for one release.
        run: |
          sleep 3
          if curl --fail --silent --show-error --retry 5 --retry-delay 3 --retry-all-errors https://go.sohag.pro/healthz; then
            exit 0
          fi

          echo "::error::health check failed after deploy; rolling back to the previous binary"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -euo pipefail
            cd /opt/go-ledger
            if [ ! -f go-ledger.prev ]; then
              echo "no go-ledger.prev on the box to roll back to" >&2
              exit 1
            fi
            cp go-ledger.prev go-ledger
            sudo systemctl restart go-ledger
          '

          sleep 3
          if curl --fail --silent --show-error --retry 5 --retry-delay 3 --retry-all-errors https://go.sohag.pro/healthz; then
            echo "::error::rolled back to the previous binary after a failed health check; the new build did NOT go live, investigate before retrying the deploy"
          else
            echo "::error::rollback restart also failed its health check; the app may be down, investigate immediately"
          fi
          exit 1
