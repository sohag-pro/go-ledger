components:
  schemas:
    AccountAuditOutputBody:
      additionalProperties: false
      properties:
        entries:
          items:
            $ref: "#/components/schemas/AuditEntryBody"
          type:
            - array
            - "null"
        next_cursor:
          description: Cursor for the next page, or null if this is the last page
          type:
            - string
            - "null"
      required:
        - entries
        - next_cursor
      type: object
    AccountBody:
      additionalProperties: false
      properties:
        currency:
          description: ISO 4217 code, e.g. USD
          type: string
        id:
          description: Account id (UUID)
          type: string
        name:
          type: string
        type:
          description: "One of: asset, liability, equity, income, expense"
          type: string
      required:
        - id
        - name
        - type
        - currency
      type: object
    AccountsOutputBody:
      additionalProperties: false
      properties:
        accounts:
          items:
            $ref: "#/components/schemas/AccountBody"
          type:
            - array
            - "null"
      required:
        - accounts
      type: object
    AuditEntryBody:
      additionalProperties: false
      properties:
        action:
          type: string
        actor:
          type: string
        after: {}
        before: {}
        created_at:
          format: date-time
          type: string
        id:
          type: string
        transaction_id:
          type: string
      required:
        - id
        - action
        - transaction_id
        - actor
        - after
        - created_at
      type: object
    AuditListOutputBody:
      additionalProperties: false
      properties:
        entries:
          items:
            $ref: "#/components/schemas/AuditEntryBody"
          type:
            - array
            - "null"
      required:
        - entries
      type: object
    BalanceOutputBody:
      additionalProperties: false
      properties:
        account_id:
          type: string
        amount:
          description: Signed balance in minor units (e.g. cents)
          format: int64
          type: integer
        currency:
          type: string
      required:
        - account_id
        - amount
        - currency
      type: object
    ConvertInputBody:
      additionalProperties: false
      properties:
        from_account:
          description: Account to debit, in its own currency
          format: uuid
          type: string
        source_amount:
          description: Amount to convert, in minor units of the from account's currency; must be positive
          format: int64
          type: integer
        to_account:
          description: Account to credit; its currency is the conversion's destination currency
          format: uuid
          type: string
      required:
        - from_account
        - to_account
        - source_amount
      type: object
    ConvertResponseBody:
      additionalProperties: false
      properties:
        fx:
          $ref: "#/components/schemas/FXDetailBody"
        transaction:
          $ref: "#/components/schemas/TransactionBody"
      required:
        - transaction
        - fx
      type: object
    CreateAccountInputBody:
      additionalProperties: false
      properties:
        currency:
          description: ISO 4217 alphabetic code. Defaults to the server's DEFAULT_CURRENCY when omitted.
          pattern: ^[A-Z]{3}$
          type: string
        name:
          description: Human-readable account name
          maxLength: 200
          minLength: 1
          type: string
        type:
          description: Fundamental account class
          enum:
            - asset
            - liability
            - equity
            - income
            - expense
          type: string
      required:
        - name
        - type
      type: object
    CreateTenantInputBody:
      additionalProperties: false
      properties:
        name:
          description: Human-readable tenant name
          maxLength: 200
          minLength: 1
          type: string
      required:
        - name
      type: object
    CreateTransactionInputBody:
      additionalProperties: false
      properties:
        currency:
          description: ISO 4217 code shared by every posting
          pattern: ^[A-Z]{3}$
          type: string
        effective_at:
          description: Optional value date, distinct from when the transaction was posted. Defaults to the post time when omitted.
          format: date-time
          type: string
        postings:
          description: Two or more legs that must sum to zero
          items:
            $ref: "#/components/schemas/PostingInput"
          maxItems: 100
          minItems: 2
          type:
            - array
            - "null"
        reference:
          description: Optional external reference for reconciliation, unique per tenant. Reusing one already in use returns 409.
          maxLength: 256
          type: string
      required:
        - currency
        - postings
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    FXDetailBody:
      additionalProperties: false
      properties:
        applied_e8:
          description: Informational, spread-adjusted rate actually reflected in converted_amount
          format: int64
          type: integer
        converted_amount:
          description: Amount credited, in minor units of the destination account's currency
          format: int64
          type: integer
        effective_at:
          description: When the applied fx_rates row went live
          format: date-time
          type: string
        mid_rate_e8:
          description: Mid rate (destination units per source unit), scaled by 1e8, before the spread
          format: int64
          type: integer
        rate_id:
          description: The fx_rates row id the mid rate and spread were read from
          format: int64
          type: integer
        rate_source:
          description: Where the mid rate came from
          type: string
        source_amount:
          description: Amount converted, in minor units of the source account's currency
          format: int64
          type: integer
        spread_bps:
          description: Spread widened against the customer, in basis points
          format: int32
          type: integer
      required:
        - source_amount
        - converted_amount
        - mid_rate_e8
        - applied_e8
        - spread_bps
        - rate_source
        - effective_at
        - rate_id
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        status:
          description: Liveness status, "ok" while the service is serving
          examples:
            - ok
          type: string
      required:
        - status
      type: object
    IssueKeyInputBody:
      additionalProperties: false
      properties:
        expires_at:
          description: Optional expiry. Omit for a key that never expires.
          format: date-time
          type: string
        name:
          description: Human-readable label for this key
          maxLength: 200
          minLength: 1
          type: string
        scopes:
          description: "One or more of: read, post, admin"
          items:
            type: string
          minItems: 1
          type:
            - array
            - "null"
        tenant_id:
          description: Tenant this key acts as
          format: uuid
          type: string
      required:
        - tenant_id
        - name
        - scopes
      type: object
    IssuedKeyBody:
      additionalProperties: false
      properties:
        expires_at:
          description: Null if the key never expires
          format: date-time
          type:
            - string
            - "null"
        id:
          type: string
        name:
          type: string
        plaintext:
          description: "The api key credential, e.g. for the Authorization: Bearer header. Shown once: store it now, it cannot be retrieved again."
          type: string
        scopes:
          items:
            type: string
          type:
            - array
            - "null"
        tenant_id:
          type: string
      required:
        - id
        - tenant_id
        - name
        - scopes
        - expires_at
        - plaintext
      type: object
    KeyBody:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        expires_at:
          description: Null if the key never expires
          format: date-time
          type:
            - string
            - "null"
        id:
          description: Key id (UUID)
          type: string
        last_used_at:
          description: Null if the key has never been used
          format: date-time
          type:
            - string
            - "null"
        name:
          type: string
        revoked_at:
          description: Null if the key is still live
          format: date-time
          type:
            - string
            - "null"
        scopes:
          items:
            type: string
          type:
            - array
            - "null"
        tenant_id:
          type: string
      required:
        - id
        - tenant_id
        - name
        - scopes
        - expires_at
        - last_used_at
        - revoked_at
        - created_at
      type: object
    ListKeysOutputBody:
      additionalProperties: false
      properties:
        keys:
          items:
            $ref: "#/components/schemas/KeyBody"
          type:
            - array
            - "null"
      required:
        - keys
      type: object
    ListTenantsOutputBody:
      additionalProperties: false
      properties:
        tenants:
          items:
            $ref: "#/components/schemas/TenantBody"
          type:
            - array
            - "null"
      required:
        - tenants
      type: object
    PostingBody:
      additionalProperties: false
      properties:
        account_id:
          type: string
        amount:
          format: int64
          type: integer
        currency:
          type: string
        description:
          type: string
      required:
        - account_id
        - amount
        - currency
        - description
      type: object
    PostingInput:
      additionalProperties: false
      properties:
        account_id:
          description: Account this leg posts to
          format: uuid
          type: string
        amount:
          description: "Signed amount in minor units: positive debit, negative credit"
          format: int64
          type: integer
        description:
          description: Optional narration for this line
          maxLength: 256
          type: string
      required:
        - account_id
        - amount
      type: object
    SetTenantPolicyInputBody:
      additionalProperties: false
      properties:
        allowed_currencies:
          description: Currencies this tenant may post in. Empty (or omitted) means every currency is allowed.
          items:
            type: string
          type:
            - array
            - "null"
        daily_volume_limit:
          description: Max per-currency cumulative debit total for the current day, in minor units. 0 (or omitted) means unlimited.
          format: int64
          type: integer
        max_transaction_amount:
          description: Max per-currency debit total for a single transaction, in minor units. 0 (or omitted) means unlimited.
          format: int64
          type: integer
      type: object
    SetTenantStatusInputBody:
      additionalProperties: false
      properties:
        status:
          description: New tenant status
          enum:
            - active
            - suspended
            - closed
          type: string
      required:
        - status
      type: object
    StatementEntryBody:
      additionalProperties: false
      properties:
        amount:
          description: Signed posting amount in minor units
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        description:
          type: string
        id:
          description: Posting id
          type: string
        running_balance:
          description: Account balance as of this posting, in minor units
          format: int64
          type: integer
        transaction_id:
          type: string
      required:
        - id
        - transaction_id
        - amount
        - running_balance
        - description
        - created_at
      type: object
    StatementOutputBody:
      additionalProperties: false
      properties:
        account_id:
          type: string
        currency:
          type: string
        entries:
          items:
            $ref: "#/components/schemas/StatementEntryBody"
          type:
            - array
            - "null"
        next_cursor:
          description: Cursor for the next page, or null if this is the last page
          type:
            - string
            - "null"
      required:
        - account_id
        - currency
        - entries
        - next_cursor
      type: object
    TenantBody:
      additionalProperties: false
      properties:
        id:
          description: Tenant id (UUID)
          type: string
        name:
          type: string
        status:
          description: "One of: active, suspended, closed"
          type: string
      required:
        - id
        - name
        - status
      type: object
    TransactionBody:
      additionalProperties: false
      properties:
        effective_at:
          description: Value date; defaults to when the transaction was posted if not supplied
          format: date-time
          type: string
        id:
          type: string
        postings:
          items:
            $ref: "#/components/schemas/PostingBody"
          type:
            - array
            - "null"
        reference:
          description: Optional client-supplied external reference, unique per tenant
          type: string
        reverses_transaction_id:
          description: "Set only when this transaction is a reversal: the id of the transaction it reverses"
          type: string
      required:
        - id
        - postings
        - effective_at
      type: object
    TransactionListOutputBody:
      additionalProperties: false
      properties:
        next_cursor:
          description: Cursor for the next page, or null if this is the last page
          type:
            - string
            - "null"
        transactions:
          items:
            $ref: "#/components/schemas/TransactionBody"
          type:
            - array
            - "null"
      required:
        - transactions
        - next_cursor
      type: object
    VerifyAuditOutputBody:
      additionalProperties: false
      properties:
        checked:
          format: int64
          type: integer
        first_break_id:
          description: Id of the first audit row that failed to verify, or null if the chain is intact
          type:
            - string
            - "null"
        pending:
          description: "Posted events not yet reflected in the chain (ADR-017): the chain is built asynchronously, so this lags briefly behind posting"
          format: int64
          type: integer
        valid:
          type: boolean
      required:
        - valid
        - checked
        - first_break_id
        - pending
      type: object
  securitySchemes:
    bearerAuth:
      description: "API key issued per tenant. Send as `Authorization: Bearer <api-key>`. Use `glk_demo_public_key_reset_every_4h` to try the API against the demo tenant."
      scheme: bearer
      type: http
info:
  contact:
    name: Sohag Hasan
    url: https://sohag.pro
  description: |-
    A production-grade payment ledger built on double-entry accounting. Every endpoint here is generated from the live Go handlers, so this spec always matches the running service.

    Amounts are signed integer minor units (e.g. cents) plus an ISO 4217 currency code. A transaction's postings must sum to zero.

    Authentication: every /v1 endpoint requires a bearer API key, sent as `Authorization: Bearer <api-key>`. A missing, unknown, or revoked key returns 401. To try the API without provisioning your own key, use the public demo key `glk_demo_public_key_reset_every_4h` (also wired into the try-it console and the Scalar playground below): it is scoped to the demo tenant and rate limited, so it is safe to expose.

    Idempotency: POST /v1/transactions requires an `Idempotency-Key` header so retries are safe. Repeating a request with the same key returns the original transaction unchanged (with `Idempotent-Replayed: true`) instead of posting again; reusing a key with a different request body returns 409 Conflict.

    This is a public demo: the data resets every 4 hours to a fresh, realistic ledger.

    - Source: [github.com/sohag-pro/go-ledger](https://github.com/sohag-pro/go-ledger)
    - Landing page: [go.sohag.pro](https://go.sohag.pro)
    - Try-it console: [go.sohag.pro/console](https://go.sohag.pro/console)
  license:
    name: MIT
    url: https://github.com/sohag-pro/go-ledger/blob/main/LICENSE
  title: go-ledger API
  version: 0.2.0
openapi: 3.1.0
paths:
  /healthz:
    get:
      description: Returns 200 with {"status":"ok"} while the service is up. Used by the deploy pipeline and uptime monitoring.
      operationId: health-check
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Liveness check
      tags:
        - meta
  /v1/accounts:
    get:
      operationId: list-accounts
      parameters:
        - description: Max accounts to return
          explode: false
          in: query
          name: limit
          schema:
            default: 100
            description: Max accounts to return
            format: int64
            maximum: 500
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List accounts
      tags:
        - accounts
    post:
      operationId: create-account
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create an account
      tags:
        - accounts
  /v1/accounts/{id}:
    get:
      operationId: get-account
      parameters:
        - description: Account id
          in: path
          name: id
          required: true
          schema:
            description: Account id
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get an account
      tags:
        - accounts
  /v1/accounts/{id}/audit:
    get:
      operationId: get-account-audit
      parameters:
        - description: Account id
          in: path
          name: id
          required: true
          schema:
            description: Account id
            format: uuid
            type: string
        - description: Max entries per page
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: Max entries per page
            format: int64
            maximum: 200
            minimum: 1
            type: integer
        - description: Opaque cursor from a previous page's next_cursor
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque cursor from a previous page's next_cursor
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountAuditOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List an account's audit log
      tags:
        - accounts
  /v1/accounts/{id}/balance:
    get:
      operationId: get-account-balance
      parameters:
        - description: Account id
          in: path
          name: id
          required: true
          schema:
            description: Account id
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get an account's balance
      tags:
        - accounts
  /v1/accounts/{id}/statement:
    get:
      operationId: get-account-statement
      parameters:
        - description: Account id
          in: path
          name: id
          required: true
          schema:
            description: Account id
            format: uuid
            type: string
        - description: Max entries per page
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: Max entries per page
            format: int64
            maximum: 200
            minimum: 1
            type: integer
        - description: Opaque cursor from a previous page's next_cursor
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque cursor from a previous page's next_cursor
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List an account's postings with running balance
      tags:
        - accounts
  /v1/admin/keys:
    get:
      description: "Lists every key for a tenant, live and revoked, oldest first. Never includes a plaintext: that is shown once, at issue or rotate time, and is never recoverable afterward."
      operationId: list-keys
      parameters:
        - description: Tenant to list keys for
          explode: false
          in: query
          name: tenant_id
          required: true
          schema:
            description: Tenant to list keys for
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListKeysOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List a tenant's api keys
      tags:
        - admin
    post:
      description: "Mints a new api key for a tenant. The plaintext is returned exactly once, in this response, and is never stored or recoverable again: store it now."
      operationId: issue-key
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueKeyInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedKeyBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Issue a new api key
      tags:
        - admin
  /v1/admin/keys/{id}/revoke:
    post:
      operationId: revoke-key
      parameters:
        - description: Key id
          in: path
          name: id
          required: true
          schema:
            description: Key id
            format: uuid
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Revoke an api key
      tags:
        - admin
  /v1/admin/keys/{id}/rotate:
    post:
      description: Mints a replacement key with the same tenant, name, and scopes as an existing one. The old key is left active (an overlap window for callers to cut over); revoke it explicitly once they have.
      operationId: rotate-key
      parameters:
        - description: Key id
          in: path
          name: id
          required: true
          schema:
            description: Key id
            format: uuid
            type: string
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedKeyBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Rotate an api key
      tags:
        - admin
  /v1/admin/tenants:
    get:
      operationId: list-tenants
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTenantsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List tenants
      tags:
        - admin
    post:
      operationId: create-tenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create a tenant
      tags:
        - admin
  /v1/admin/tenants/{id}/policy:
    post:
      description: "Sets the tenant's optional per-currency guardrails (Task 2.4b): a max transaction amount, a daily volume cap, and a currency allowlist. Writes the full policy the body describes; an omitted field clears (unlimits) that guardrail rather than leaving a previous value in place."
      operationId: set-tenant-policy
      parameters:
        - description: Tenant id
          in: path
          name: id
          required: true
          schema:
            description: Tenant id
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetTenantPolicyInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Set a tenant's posting guardrails
      tags:
        - admin
  /v1/admin/tenants/{id}/status:
    post:
      operationId: set-tenant-status
      parameters:
        - description: Tenant id
          in: path
          name: id
          required: true
          schema:
            description: Tenant id
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
