version: 2
project_name: go-ledger
builds:
  - id: server
    main: ./cmd/server
    binary: go-ledger
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.buildRevision={{ .ShortCommit }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
  - id: ledgerctl
    main: ./cmd/ledgerctl
    binary: ledgerctl
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
archives:
  - id: default
    ids: [server, ledgerctl]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - { goos: windows, formats: [zip] }
checksum:
  name_template: "checksums.txt"
changelog:
  use: github
  sort: asc
