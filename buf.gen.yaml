version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/sohag-pro/go-ledger/internal/genproto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: internal/genproto
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: internal/genproto
    opt: paths=source_relative
