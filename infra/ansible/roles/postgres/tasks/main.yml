---
- name: Install PostgreSQL and the psycopg dependency Ansible needs
  ansible.builtin.apt:
    name:
      - postgresql
      - python3-psycopg2
    state: present
    update_cache: true

- name: Ensure PostgreSQL is running
  ansible.builtin.service:
    name: postgresql
    enabled: true
    state: started

- name: Create the goledger role
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ pg_role }}"
    password: "{{ pg_password }}"

- name: Create the goledger database owned by the role
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ pg_database }}"
    owner: "{{ pg_role }}"

- name: Keep Postgres bound to localhost only
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = 'localhost'"
  notify: Restart postgresql

- name: Tune Postgres memory for the 1GB shared box
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "shared_buffers", value: "128MB" }
    - { key: "work_mem", value: "8MB" }
    - { key: "max_connections", value: "20" }
  notify: Restart postgresql

- name: Backups directory
  ansible.builtin.file:
    path: /var/backups/go-ledger
    state: directory
    mode: "0700"

- name: Daily pg_dump backup script
  ansible.builtin.template:
    src: go-ledger-backup.j2
    dest: /etc/cron.daily/go-ledger-backup
    mode: "0755"

# --- Offsite durability: pgBackRest (ADR-016) ---------------------------
# WAL archiving plus full/differential base backups shipped to an encrypted,
# offsite S3-compatible repository, giving point-in-time recovery. This is
# the disaster recovery path; the pg_dump above stays as a same-box
# convenience only.

- name: Install pgbackrest
  ansible.builtin.apt:
    name: pgbackrest
    state: present
    update_cache: true

- name: Create the pgbackrest config directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Create the pgbackrest spool directory for async WAL archiving
  ansible.builtin.file:
    path: /var/spool/pgbackrest
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Template the pgbackrest repository configuration
  ansible.builtin.template:
    src: pgbackrest.conf.j2
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: postgres
    group: postgres
    mode: "0640"

- name: Enable WAL archiving to pgbackrest
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "wal_level", value: "replica" }
    - { key: "archive_mode", value: "on" }
    - { key: "archive_command", value: "'pgbackrest --stanza={{ pgbackrest_stanza }} archive-push %p'" }
    - { key: "archive_timeout", value: "60" }
    - { key: "max_wal_senders", value: "3" }
  notify: Restart postgresql

- name: Note whether the offsite pgbackrest repository is provisioned
  ansible.builtin.set_fact:
    postgres_pgbackrest_configured: "{{ pgbackrest_s3_endpoint != 'REPLACE_ME' }}"

- name: Skip stanza creation until the offsite repository is provisioned
  ansible.builtin.debug:
    msg: >-
      pgbackrest_s3_endpoint is still REPLACE_ME, so the offsite repository
      has not been provisioned yet. Skipping stanza-create and leaving the
      backup timers installed but unstarted. Fill in the real S3 values in
      group_vars/all.yml or vault, then re-run this role.
  when: not postgres_pgbackrest_configured

- name: Create the pgbackrest stanza (safe to re-run, already-exists is not an error)
  ansible.builtin.command: pgbackrest --stanza={{ pgbackrest_stanza }} stanza-create
  become: true
  become_user: postgres
  when: postgres_pgbackrest_configured
  register: postgres_pgbackrest_stanza_create
  changed_when: >-
    'already exists' not in (postgres_pgbackrest_stanza_create.stdout | default(''))
    and 'already exists' not in (postgres_pgbackrest_stanza_create.stderr | default(''))
  failed_when: >-
    postgres_pgbackrest_stanza_create.rc != 0
    and 'already exists' not in (postgres_pgbackrest_stanza_create.stdout | default(''))
    and 'already exists' not in (postgres_pgbackrest_stanza_create.stderr | default(''))

- name: Install the pgbackrest systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - pgbackrest-full.service
    - pgbackrest-full.timer
    - pgbackrest-diff.service
    - pgbackrest-diff.timer

- name: Enable and start the pgbackrest backup timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - pgbackrest-full.timer
    - pgbackrest-diff.timer
  when: postgres_pgbackrest_configured
