---
- name: Install the go-ledger systemd unit
  ansible.builtin.template:
    src: go-ledger.service.j2
    dest: /etc/systemd/system/go-ledger.service
    mode: "0644"
  notify: Reload systemd

- name: Enable go-ledger (do not force-start; the deploy ships the binary)
  ansible.builtin.systemd_service:
    name: go-ledger
    enabled: true
