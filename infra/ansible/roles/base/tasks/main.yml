---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - acl
    state: present
    update_cache: true

- name: Enable unattended-upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Ensure fail2ban is running
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started

- name: Ufw default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Ufw default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Ufw allow ssh, http, https only
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["22", "80", "443"]

- name: Enable ufw
  community.general.ufw:
    state: enabled
