syntax = "proto3";

package ledger.v1;

// Posting is one signed leg of a transaction. A positive amount is a debit, a
// negative amount is a credit. Amounts are minor units (for example cents).
// Currency is the posting's own currency: a cross-currency (FX) convert
// transaction spans two currencies, so each leg is labeled with its own
// rather than inheriting one shared transaction-level currency.
message Posting {
  string account_id = 1;
  int64 amount = 2;
  string description = 3;
  string currency = 4;
}

// Transaction deliberately has no transaction-level currency field: a convert
// transaction spans two currencies, so a single top-level currency could
// never label every posting correctly. Each Posting carries its own instead.
message Transaction {
  reserved 2;
  reserved "currency";
  string id = 1;
  repeated Posting postings = 3;
  // reverses_transaction_id is set only when this transaction is itself a
  // reversal (Task 4.2, audit A1.2): the id of the transaction it reverses.
  // Empty for an ordinary post or convert.
  string reverses_transaction_id = 4;
  // reference is the caller's optional external id for reconciliation (Task
  // 4.3, audit A1.3), unique per tenant when present. Empty when the
  // transaction was posted without one.
  string reference = 5;
  // effective_at is the value date (Task 4.3, audit A1.3): when the
  // transaction is considered to have happened economically. Always set,
  // even when the caller supplied none: it then falls back to when the
  // transaction was actually posted. RFC3339 timestamp.
  string effective_at = 6;
}

// status and min_balance are Task 5.5 (audit A1.5) additions: status is one
// of active, frozen, or closed; min_balance is the optional floor enforced
// on the account's derived balance, in minor units. min_balance is 0 when
// unset (proto3 has no distinct "absent" for a scalar int64), matching a
// literal 0 floor; a caller that needs to tell "no floor" apart from "floor
// of exactly zero" should use the REST API, whose min_balance is a JSON
// null-able field.
message Account {
  string id = 1;
  string name = 2;
  string type = 3; // asset, liability, equity, income, or expense
  string currency = 4;
  string status = 5;
  int64 min_balance = 6;
}

// min_balance (Task 5.5, audit A1.5) is optional: 0 means no floor was
// requested, the same convention Account.min_balance above documents.
message CreateAccountRequest {
  string name = 1;
  string type = 2;
  string currency = 3;
  int64 min_balance = 4;
}
message CreateAccountResponse {
  Account account = 1;
}

message GetAccountRequest {
  string id = 1;
}
message GetAccountResponse {
  Account account = 1;
}

// SetAccountStatusRequest freezes, closes, or reactivates one account (Task
// 5.5, audit A1.5), mirroring POST /v1/accounts/{id}/status.
message SetAccountStatusRequest {
  string id = 1;
  string status = 2; // one of: active, frozen, closed
}
message SetAccountStatusResponse {
  Account account = 1;
}

message ListAccountsRequest {
  int32 limit = 1;
}
message ListAccountsResponse {
  repeated Account accounts = 1;
}

message GetBalanceRequest {
  string account_id = 1;
}
message GetBalanceResponse {
  string account_id = 1;
  int64 amount = 2;
  string currency = 3;
}

message StatementEntry {
  string id = 1;
  string transaction_id = 2;
  int64 amount = 3;
  int64 running_balance = 4;
  string description = 5;
  string created_at = 6; // RFC3339 timestamp
}
message GetStatementRequest {
  string account_id = 1;
  int32 limit = 2;
  string cursor = 3;
}
message GetStatementResponse {
  string account_id = 1;
  string currency = 2;
  repeated StatementEntry entries = 3;
  string next_cursor = 4;
}

// PostTransactionRequest carries the balanced transaction. The idempotency key,
// when supplied, travels in the gRPC metadata key "idempotency-key", mirroring
// the REST Idempotency-Key header, not in this message.
message PostTransactionRequest {
  string currency = 1;
  repeated Posting postings = 2;
  // reference is an optional external id for reconciliation (Task 4.3, audit
  // A1.3), unique per tenant when supplied. Reusing one already in use
  // returns ALREADY_EXISTS.
  string reference = 3;
  // effective_at is an optional value date (Task 4.3, audit A1.3), distinct
  // from when the row is actually written. Empty defaults to the post time.
  // RFC3339 timestamp.
  string effective_at = 4;
}
message PostTransactionResponse {
  Transaction transaction = 1;
  bool replayed = 2;
}

message GetTransactionRequest {
  string id = 1;
}
message GetTransactionResponse {
  Transaction transaction = 1;
}

// ListTransactionsRequest lists the tenant's transactions, newest first,
// keyset paged by cursor, optionally filtered by a from/to created_at range
// and/or an exact reference match (Task 4.4, audit A7.2), mirroring GET
// /v1/transactions. from and to are RFC3339 timestamps; from is inclusive,
// to is exclusive. Export has no gRPC equivalent: a streaming CSV export
// does not fit gRPC's single-response model, so it stays REST-only.
message ListTransactionsRequest {
  string from = 1;
  string to = 2;
  string reference = 3;
  int32 limit = 4;
  string cursor = 5;
}
message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  string next_cursor = 2;
}

// ReverseTransactionRequest posts the negated legs of original_transaction_id
// as a new, linked transaction (Task 4.2, audit A1.2). Idempotent: a
// transaction can be reversed at most once, so calling this again for the
// same original returns the SAME reversal, with already_reversed = true,
// instead of posting a second one.
message ReverseTransactionRequest {
  string original_transaction_id = 1;
}
message ReverseTransactionResponse {
  Transaction transaction = 1;
  bool already_reversed = 2;
}

message AuditEntry {
  string id = 1;
  string action = 2;
  string transaction_id = 3;
  string actor = 4;
  string before = 5; // raw JSON, may be empty for a create
  string after = 6; // raw JSON snapshot
  string created_at = 7; // RFC3339 timestamp
}
message GetTransactionAuditRequest {
  string transaction_id = 1;
}
message GetTransactionAuditResponse {
  repeated AuditEntry entries = 1;
}
message GetAccountAuditRequest {
  string account_id = 1;
  int32 limit = 2;
  string cursor = 3;
}
message GetAccountAuditResponse {
  repeated AuditEntry entries = 1;
  string next_cursor = 2;
}

// FXDetail is the applied-rate detail for a cross-currency convert: the
// requested and converted amounts, the mid rate and spread applied, and
// where that rate came from (ADR-014 decision 7).
message FXDetail {
  int64 source_amount = 1;
  int64 converted_amount = 2;
  int64 mid_rate_e8 = 3;
  int64 applied_e8 = 4;
  int32 spread_bps = 5;
  string rate_source = 6;
  string effective_at = 7; // RFC3339 timestamp
  int64 rate_id = 8;
}

// ConvertRequest converts source_amount from the from_account's currency into
// the to_account's currency, at the tenant's current FX rate. The
// idempotency key, when supplied, travels in the gRPC metadata key
// "idempotency-key", the same as PostTransactionRequest, not in this message.
// The destination currency always comes from the to account: a client cannot
// supply a rate or target currency directly.
message ConvertRequest {
  string from_account = 1;
  string to_account = 2;
  int64 source_amount = 3;
}
message ConvertResponse {
  Transaction transaction = 1;
  FXDetail fx = 2;
  bool replayed = 3;
}

service LedgerService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc SetAccountStatus(SetAccountStatusRequest) returns (SetAccountStatusResponse);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetStatement(GetStatementRequest) returns (GetStatementResponse);
  rpc PostTransaction(PostTransactionRequest) returns (PostTransactionResponse);
  rpc Convert(ConvertRequest) returns (ConvertResponse);
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc ReverseTransaction(ReverseTransactionRequest) returns (ReverseTransactionResponse);
  rpc GetTransactionAudit(GetTransactionAuditRequest) returns (GetTransactionAuditResponse);
  rpc GetAccountAudit(GetAccountAuditRequest) returns (GetAccountAuditResponse);
}
